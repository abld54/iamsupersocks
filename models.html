}
.stat-lbl {

}
.stat-divider {

/* ─── CONTROLS ─── */

.control-label {

// ── PARSE MODELS ──
function parseModels() {
  return MODELS_RAW.split('\n').map(line => {
    const [name, org, date, params, license, arch, ...noteParts] = line.split(',').map(s => s.trim());
    const note = noteParts.join(', ');
    
    // Parse params: "175B" → 175, "null" → null
    let paramsNum = null;
    if (params && params !== 'null') {
      const match = params.match(/(\d+\.?\d*)/);
      if (match) paramsNum = parseFloat(match[1]);
    }
    
    return {
      name,
      org,
      date: new Date(date + '-01'),
      dateStr: date,
      params: paramsNum,
      paramsStr: params,
      license,
      arch,
      note,
      color: ORG_COLORS[org] || '#ffffff'
    };
  }).filter(m => m.name);
}

let allModels = parseModels();
let filteredModels = [...allModels];
let currentView = 'chart';
let filters = {
  license: 'all',
  org: 'all'
};

// ── UPDATE STATS ──
function updateStats() {
  const total = filteredModels.length;
  const open = filteredModels.filter(m => m.license === 'open').length;
  const closed = filteredModels.filter(m => m.license === 'closed').length;
  const moe = filteredModels.filter(m => m.arch === 'moe').length;
  const dense = filteredModels.filter(m => m.arch === 'dense').length;
  
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-open').textContent = open;
  document.getElementById('stat-closed').textContent = closed;
  document.getElementById('stat-moe').textContent = moe;
  document.getElementById('stat-dense').textContent = dense;
}

// ── APPLY FILTERS ──
function applyFilters() {
  filteredModels = allModels.filter(m => {
    if (filters.license !== 'all' && m.license !== filters.license) return false;
    if (filters.org !== 'all' && m.org !== filters.org) return false;
    return true;
  });
  updateStats();
  if (currentView === 'chart') renderChart();
  else renderList();
  updateLegend();
}

// ── RENDER CHART ──
let chartInstance = null;

function renderChart() {
  const ctx = document.getElementById('chart').getContext('2d');
  
  // Prepare data points
  const points = filteredModels
    .filter(m => m.params !== null)
    .map(m => ({
      x: m.date.getTime(),
      y: m.params,
      model: m
    }));
  
  // Group by org for datasets
  const orgMap = {};
  points.forEach(p => {
    const org = p.model.org;
    if (!orgMap[org]) orgMap[org] = [];
    orgMap[org].push(p);
  });
  
  const datasets = Object.keys(orgMap).map(org => {
    const color = ORG_COLORS[org] || '#ffffff';
    return {
      label: org,
      data: orgMap[org],
      backgroundColor: color,
      borderColor: color,
      borderWidth: 2,
      pointRadius: orgMap[org].map(p => {
        // Size based on log(params), smaller on mobile
        const isMobile = window.innerWidth < 768;
        const size = Math.log10(p.y) * (isMobile ? 1.8 : 2.5);
        return Math.max(isMobile ? 3 : 4, Math.min(isMobile ? 10 : 16, size));
      }),
      pointStyle: orgMap[org].map(p => p.model.arch === 'moe' ? 'triangle' : 'circle'),
      pointHoverRadius: orgMap[org].map(p => {
        const isMobile = window.innerWidth < 768;
        const size = Math.log10(p.y) * (isMobile ? 1.8 : 2.5);
        return Math.max(isMobile ? 5 : 6, Math.min(isMobile ? 12 : 20, size + 2));
      })
    };
  });
  
  if (chartInstance) chartInstance.destroy();
  
  chartInstance = new Chart(ctx, {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,10,15,0.95)',
          titleColor: '#00dcff',
          bodyColor: '#c9d1d9',
          borderColor: 'rgba(0,220,255,0.25)',
          borderWidth: 1,
          padding: 12,
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont: { family: 'Inter', size: 11 },
          displayColors: false,
          callbacks: {
            title: ctx => {
              const p = ctx[0].raw;
              return p.model.name;
            },
            label: ctx => {
              const p = ctx.raw;
              const m = p.model;
              return [
                `Org: ${m.org}`,
                `Date: ${m.dateStr}`,
                `Params: ${m.paramsStr}`,
                `Type: ${m.arch.toUpperCase()}`,
                `License: ${m.license === 'open' ? 'Open Source' : 'Propriétaire'}`,
                m.note ? `Note: ${m.note}` : ''
              ].filter(Boolean);
            }
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: {
            unit: 'year',
            displayFormats: { year: 'yyyy' }
          },
          min: new Date('2020-01-01').getTime(),
          max: new Date('2027-01-01').getTime(),
          grid: {
            color: 'rgba(0,220,255,0.08)',
            drawBorder: false
          },
          ticks: {
            color: '#8b949e',
            font: { family: 'JetBrains Mono', size: 11 }
          }
        },
        y: {
          type: 'logarithmic',
          min: 1,
          max: 10000,
          grid: {
            color: 'rgba(0,220,255,0.08)',
            drawBorder: false
          },
          ticks: {
            color: '#8b949e',
            font: { family: 'JetBrains Mono', size: 11 },
            callback: value => value >= 1000 ? (value/1000) + 'T' : value + 'B'
          },
          title: {
            display: true,
            text: 'Parameters (log scale)',
            color: '#00dcff',
            font: { family: 'JetBrains Mono', size: 12 }
          }
        }
      }
    }
  });
}

// ── RENDER LIST ──
function renderList() {
  const byYear = {};
  filteredModels.forEach(m => {
    const year = m.date.getFullYear();
    if (!byYear[year]) byYear[year] = [];
    byYear[year].push(m);
  });
  
  const years = Object.keys(byYear).sort((a, b) => b - a);
  
  let html = '';
  years.forEach(year => {
    const models = byYear[year];
    html += `
      <div class="year-section">
        <div class="year-header">
          ${year}
          <span class="year-count">${models.length} models</span>
        </div>
        <div class="models-grid">
          ${models.map(m => `
            <div class="model-card" style="--org-color:${m.color}">
              <div class="model-header">
                <div class="model-name">${m.name}</div>
                <div class="model-badges">
                  <span class="badge badge-${m.license}">${m.license === 'open' ? 'Open' : 'Closed'}</span>
                  <span class="badge badge-${m.arch}">${m.arch.toUpperCase()}</span>
                </div>
              </div>
              <div class="model-meta">
                <span class="model-org">${m.org}</span>
                <span>•</span>
                <span class="model-params">${m.paramsStr}</span>
                <span>•</span>
                <span>${m.dateStr}</span>
              </div>
              <div class="model-note">${m.note}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
  
  document.getElementById('list-view').innerHTML = html;
}

// ── LEGEND ──
function updateLegend() {
  const orgCounts = {};
  filteredModels.forEach(m => {
    orgCounts[m.org] = (orgCounts[m.org] || 0) + 1;
  });
  
  const sorted = Object.entries(orgCounts).sort((a, b) => b[1] - a[1]);
  
  const html = sorted.map(([org, count]) => {
    const color = ORG_COLORS[org] || '#ffffff';
    const inactive = filters.org !== 'all' && filters.org !== org ? 'inactive' : '';
    return `
      <div class="legend-item ${inactive}" onclick="toggleOrg('${org}')">
        <span class="legend-dot" style="background:${color}"></span>
        <span class="legend-name">${org}</span>
        <span class="legend-count">${count}</span>
      </div>
    `;
  }).join('');
  
  document.getElementById('legend-grid').innerHTML = html;
}

function toggleOrg(org) {
  if (filters.org === org) {
    filters.org = 'all';
    document.getElementById('org-filter').value = 'all';
  } else {
    filters.org = org;
    document.getElementById('org-filter').value = org;
  }
  applyFilters();
}

// ── VIEW TOGGLE ──
function setView(view) {
  currentView = view;
  document.querySelectorAll('.toggle-view').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  
  if (view === 'chart') {
    document.getElementById('chart-view').style.display = 'block';
    document.getElementById('list-view').style.display = 'none';
    renderChart();
  } else {
    document.getElementById('chart-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    renderList();
  }
}

// ── FILTER HANDLERS ──
document.querySelectorAll('.btn[data-filter="license"]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn[data-filter="license"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filters.license = btn.dataset.value;
    applyFilters();
  });
});

document.getElementById('org-filter').addEventListener('change', e => {
  filters.org = e.target.value;
  applyFilters();
});

// ── POPULATE ORG DROPDOWN ──
function populateOrgDropdown() {
  const orgs = [...new Set(allModels.map(m => m.org))].sort();
  const select = document.getElementById('org-filter');
  orgs.forEach(org => {
    const opt = document.createElement('option');
    opt.value = org;
    opt.textContent = org;
    select.appendChild(opt);
  });
}

// ── INIT ──
function init() {
  populateOrgDropdown();
  updateStats();
  const isMobile = window.innerWidth < 768;
  if (isMobile) {
    currentView = 'list';
    document.querySelectorAll('.toggle-view').forEach(btn => btn.classList.remove('active'));
    document.querySelector('.toggle-view[onclick*="list"]').classList.add('active');
    document.getElementById('chart-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    renderList();
  } else {
    renderChart();
  }
  updateLegend();
}

init();
</script>

</body>
</html>
