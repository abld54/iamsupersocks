name: Fetch AI Signal Data

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch feeds & analyze with Grok
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: python scripts/fetch-rss.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add veille-data.json
          git diff --staged --quiet || git commit -m "chore: update AI signal data [skip ci]"
          git pull --rebase origin main
          git push
